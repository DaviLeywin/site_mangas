<div id="chapter-page">
    <header class="reader-header">
        <button class="secondary-action" id="voltar-manga">Voltar ao mangá</button>
        <div>
            <span class="section-kicker" id="reader-manga-title">Mangá</span>
            <h1 id="reader-chapter-title">Capítulo</h1>
        </div>
        <div class="reader-actions">
            <button class="secondary-action" id="capitulo-anterior">Anterior</button>
            <button class="primary-action" id="proximo-capitulo">Próximo</button>
        </div>
    </header>

    <main id="reader-pages" class="reader-pages"></main>

    <button id="reader-top" class="floating-reader-button" aria-label="Voltar ao topo">↑</button>
</div>
